; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:mik32v2]
platform = https://github.com/MikronMIK32/platform-mik32.git
board = start-mik32-v1 
;framework = framework-mik32v2-sdk
; board_build.ldscript = ram
; upload_protocol = start-link
board_build.ldscript = external/mik32v2-shared-main/ldscripts/eeprom.ld
build_flags =
    -I external/mik32v2-shared-main/include
    -I external/mik32v2-shared-main/periphery
    -L external/mik32v2-shared-main/ldscripts
build_src_filter =
    +<*>
    +<../external/mik32v2-shared-main/runtime/crt0.S>
